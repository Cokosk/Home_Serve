services:
  mysql:
    image: mysql:8.0
    container_name: openclaw-deploy-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: openclaw_deploy
      TZ: Asia/Shanghai
    ports:
      - "13307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: openclaw-deploy-backend
    ports:
      - "18080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/openclaw_deploy?useSSL=false&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: openclaw-deploy-frontend
    ports:
      - "10080:80"
    depends_on:
      - backend

volumes:
  mysql_data: