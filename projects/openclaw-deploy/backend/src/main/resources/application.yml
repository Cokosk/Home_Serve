server:
  port: 8080

spring:
  application:
    name: openclaw-deploy
  
  datasource:
    url: jdbc:mysql://localhost:13306/openclaw_deploy?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

logging:
  level:
    com.openclaw: DEBUG
    org.springframework.web: INFO