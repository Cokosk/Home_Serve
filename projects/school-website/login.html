<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学校官网模拟 - 登录</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="logo">
                <div style="width: 80px; height: 80px; background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%); border-radius: 50%; margin: 0 auto; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; font-weight: bold;">校</div>
            </div>
            <h2>用户登录</h2>
            <form onsubmit="return validateForm()">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" placeholder="请输入用户名" required>
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" placeholder="请输入密码" required>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">再次输入密码</label>
                    <input type="password" id="confirmPassword" placeholder="请再次输入密码" required>
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="remember"> 记住我
                    </label>
                </div>
                <button type="submit" class="login-btn">登 录</button>
            </form>
            <div class="login-footer">
                <p><a href="#">忘记密码？</a> | <a href="main.html">返回首页</a></p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
